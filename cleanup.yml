name: Auto-delete old scans

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to delete files from the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete scan files older than 10 days
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking for scan files older than 10 days in /scans folder..."
          
          # Make sure the scans folder exists
          if [ ! -d "scans" ]; then
            echo "No scans/ folder found. Nothing to clean."
            exit 0
          fi

          # Calculate cutoff timestamp (10 days ago)
          CUTOFF=$(date -d '10 days ago' +%s 2>/dev/null || date -v-10d +%s)
          DELETED=0

          # List all files in scans/ and check their commit date
          for FILE in scans/*.bin; do
            [ -f "$FILE" ] || continue
            
            # Get the last commit date of this file via GitHub API
            FILENAME=$(basename "$FILE")
            COMMIT_DATE=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits?path=scans/$FILENAME&per_page=1" \
              | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['commit']['committer']['date'] if data else '')" 2>/dev/null)

            if [ -z "$COMMIT_DATE" ]; then
              echo "Could not get date for $FILENAME, skipping."
              continue
            fi

            # Convert commit date to timestamp
            FILE_TS=$(date -d "$COMMIT_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$COMMIT_DATE" +%s 2>/dev/null)

            if [ -z "$FILE_TS" ]; then
              echo "Could not parse date for $FILENAME, skipping."
              continue
            fi

            if [ "$FILE_TS" -lt "$CUTOFF" ]; then
              echo "Deleting $FILENAME (uploaded: $COMMIT_DATE)"
              
              # Get the file SHA needed for deletion
              FILE_SHA=$(curl -s \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/contents/scans/$FILENAME" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)

              if [ -n "$FILE_SHA" ]; then
                curl -s -X DELETE \
                  -H "Authorization: Bearer $GITHUB_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${{ github.repository }}/contents/scans/$FILENAME" \
                  -d "{\"message\":\"Auto-delete scan $FILENAME (older than 10 days)\",\"sha\":\"$FILE_SHA\"}" \
                  > /dev/null
                echo "  ✓ Deleted $FILENAME"
                DELETED=$((DELETED+1))
              fi
            else
              echo "Keeping $FILENAME (recent)"
            fi
          done

          echo ""
          echo "Cleanup complete. Deleted $DELETED file(s)."
